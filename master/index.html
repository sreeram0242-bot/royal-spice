<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Master Login - Royal Spice</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
  <div style="background-color: var(--panel-bg); padding: 40px; border-radius: 12px; width: 400px; text-align: center;">
    <h2 class="brand" style="color: var(--gold); margin-bottom: 8px; font-family: 'Playfair Display', serif;">👑 Royal Spice</h2>
    <p style="color: var(--text-muted); margin-bottom: 24px;">Master Control Panel</p>
    <form id="loginForm">
      <input type="text" id="username" class="login-input" placeholder="Master Username" required>
      <input type="password" id="password" class="login-input" placeholder="Password" required>
      <button type="submit" class="btn-gold" style="width: 100%;">Login to Master</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:5000/api/auth/master/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('masterToken', data.token);
          window.location.href = 'dashboard.html';
        } else {
          alert(data.message);
        }
      } catch (err) {
        alert('Server error');
      }
    });
  </script>
</body>
</html>
