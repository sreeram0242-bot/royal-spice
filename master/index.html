<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Login — Royal Spice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --purple: #7C3AED;
      --purple-light: #A78BFA;
      --purple-dim: rgba(124, 58, 237, 0.15);
      --gold: #C9A84C;
      --gold-dim: rgba(201, 168, 76, 0.12);
      --bg: #060608;
      --panel: #0E0E14;
      --border: rgba(124, 58, 237, 0.2);
      --border-gold: rgba(201, 168, 76, 0.2);
      --text: #FFFFFF;
      --muted: #888888;
      --input-bg: #141420;
      --error: #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: float 10s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: var(--purple);
      opacity: 0.08;
      top: -200px; right: -150px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: var(--gold);
      opacity: 0.06;
      bottom: -100px; left: -100px;
      animation-delay: -5s;
    }
    .bg-orb-3 {
      width: 250px; height: 250px;
      background: var(--purple-light);
      opacity: 0.05;
      top: 40%; left: 30%;
      animation-delay: -2.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-25px) scale(1.04); }
    }

    /* Subtle dot grid */
    .dot-grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(124,58,237,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 10;
      width: 480px;
      max-width: 95vw;
      background: var(--panel);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 52px 48px;
      box-shadow:
        0 50px 150px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    /* Crown icon at top */
    .card-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--purple-dim), rgba(124,58,237,0.08));
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 28px;
    }

    .card-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.8px;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 36px;
    }

    /* Access level badge */
    .access-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(90deg, rgba(124,58,237,0.2), rgba(201,168,76,0.1));
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--purple-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 36px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--purple-light);
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Form elements */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder { color: #333; }

    .form-input:focus {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: var(--purple-light); }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.45);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #F87171;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .error-msg.show { display: block; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .divider-text {
      font-size: 11px;
      color: #444;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #333;
    }

    @media (max-width: 520px) {
      .login-card { padding: 36px 24px; }
      .card-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="dot-grid"></div>

  <div class="login-card">
    <div class="card-icon">👑</div>
    <div class="card-title">Master Panel</div>
    <div class="card-subtitle">Central control for all restaurant operations</div>

    <div class="access-badge">
      <span class="badge-dot"></span>
      Super Admin Access
    </div>

    <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter master username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 46px;">
          <button type="button" class="toggle-eye" id="eyeBtn" onclick="togglePassword()">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Access Master Panel</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Royal Spice Platform</span>
      <div class="divider-line"></div>
    </div>
    <div class="footer-note">Restricted access — authorized personnel only</div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Verifying...';
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/auth/master/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          btn.textContent = 'Access Granted';
          localStorage.setItem('masterToken', data.token);
          setTimeout(() => window.location.href = 'dashboard.html', 400);
        } else {
          errorMsg.textContent = data.message || 'Invalid credentials. Please try again.';
          errorMsg.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Access Master Panel';
        }
      } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Please try again.';
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Access Master Panel';
      }
    });
  </script>
</body>
</html>
