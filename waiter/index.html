<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Waiter Portal - Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
  <div class="bg-watermark"></div>

  <div class="login-header">
    <div style="font-size: 50px; color: #3b82f6; margin-bottom: 8px;">
      <i data-lucide="cloud" style="width: 64px; height: 64px; stroke-width: 1.5;"></i>
    </div>
    <div class="login-title">Cloud <span>Dine</span></div>
    <div class="login-subtitle">WAITER PORTAL</div>
  </div>

  <div class="login-box">
    <div style="text-align: center; margin-bottom: 24px;">
      <div class="welcome-text">Welcome Back! <span style="font-size: 20px;">👋</span></div>
      <div class="welcome-sub">Sign in to continue to your account</div>
    </div>
    
    <div style="color: var(--red); font-size: 13px; text-align: center; margin-bottom: 12px; display: none;" id="errorBox"></div>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <i data-lucide="user" class="input-icon-left" style="width: 18px; height: 18px;"></i>
        <input type="text" id="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i data-lucide="lock" class="input-icon-left" style="width: 18px; height: 18px;"></i>
        <input type="password" id="password" placeholder="Password" required>
        <i data-lucide="eye" class="input-icon-right" id="eyeBtn" onclick="togglePwd()" style="width: 18px; height: 18px;"></i>
      </div>

      <div class="login-options">
        <label><input type="checkbox" id="rememberMe"> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-signin" id="submitBtn">Sign In</button>
    </form>

    <div class="help-text">
      Need help? <a href="#">Contact Admin</a>
    </div>
    
    <div class="version">v1.0.0</div>
  </div>

  <script>
    lucide.createIcons();

    function togglePwd() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.setAttribute('data-lucide', 'eye-off');
      } else {
        inp.type = 'password';
        btn.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorBox.style.display = 'none';

      try {
        const res = await fetch('/api/auth/waiter/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('waiterToken', data.token);
          localStorage.setItem('waiterRestaurantId', data.restaurantId);
          localStorage.setItem('waiterName', data.waiterName);
          btn.textContent = 'Success!';
          setTimeout(() => window.location.href = 'dashboard.html', 400);
        } else {
          errorBox.textContent = data.message || 'Invalid credentials.';
          errorBox.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errorBox.textContent = 'Cannot connect to server. Please try again.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
