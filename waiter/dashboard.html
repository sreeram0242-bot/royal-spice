<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Waiter Dashboard — Royal Spice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon"><i data-lucide="chef-hat" style="color:#000;"></i></span>
      <div>
        <div class="topbar-name" id="waiterName">Waiter</div>
        <div class="topbar-restaurant" id="restaurantNameTop">Loading...</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="call-badge" id="callBadge" onclick="showTab('calls')" style="display:none; align-items: center; gap: 4px;">
        <i data-lucide="bell-ring" style="width:16px;height:16px;"></i> <span id="callCount">0</span>
      </button>
      <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle theme">
        <i data-lucide="moon" style="width:18px;height:18px;"></i>
      </button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Tab Nav -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-tables" onclick="showTab('tables')">
      <span><i data-lucide="armchair"></i></span> Tables
    </button>
    <button class="tab-btn" id="tab-calls" onclick="showTab('calls')">
      <span><i data-lucide="bell"></i></span> Calls
    </button>
    <button class="tab-btn" id="tab-liveorders" onclick="showTab('liveorders')">
      <span><i data-lucide="activity"></i></span> Live Orders
    </button>
  </div>

  <!-- TABLES TAB -->
  <div class="tab-content active" id="tabTables">
    <div class="section-header">
      <span>All Tables</span>
      <button class="btn-refresh" onclick="loadTables()">↻ Refresh</button>
    </div>
    <div class="table-grid" id="tableGrid">
      <div class="loading-text">Loading tables...</div>
    </div>
  </div>

  <!-- CALLS TAB -->
  <div class="tab-content" id="tabCalls">
    <div class="section-header">
      <span>Waiter Calls</span>
      <button class="btn-refresh" onclick="loadCalls()">↻ Refresh</button>
    </div>
    <div id="callsList">
      <div class="loading-text">Loading calls...</div>
    </div>
  </div>

  <!-- LIVE ORDERS TAB -->
  <div class="tab-content" id="tabLiveorders">
    <div class="section-header">
      <span>Live Orders (Table-wise)</span>
      <button class="btn-refresh" onclick="loadLiveOrders()">↻ Refresh</button>
    </div>
    <div id="liveOrdersContainer">
      <div class="loading-text">Loading live orders...</div>
    </div>
  </div>

  <!-- ORDER OVERLAY (Hidden by default) -->
  <div id="orderOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-color); z-index:999; overflow-y:auto; padding:20px;">
    <div class="section-header" style="margin-bottom: 20px;">
      <span>Place Order</span>
      <button class="btn-refresh" id="backToTablesBtn" style="padding: 6px 12px; font-size: 13px;" onclick="closeOrderOverlay()">← Back</button>
    </div>

    <div class="order-form">
      <!-- Menu Section -->
      <div id="orderMenuSection" style="display:none;">
        <div class="form-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
          <h3 style="color:var(--gold-primary); margin:0;">Ordering for Table <span id="activeOrderTableNum"></span></h3>
          <input type="hidden" id="orderTable">
          <input type="hidden" id="orderSessionId">
        </div>

      <!-- Category Filter -->
      <div class="cat-filter" id="catFilter"></div>

      <!-- Menu Items -->
      <div class="menu-grid" id="menuGrid">
        <div class="loading-text">Loading menu...</div>
      </div>

      <!-- Cart -->
      <div class="cart-section" id="cartSection" style="display:none;">
        <div class="cart-title"><i data-lucide="shopping-cart" style="vertical-align: middle; margin-right: 4px;"></i> Order Summary</div>
        <div id="cartItems"></div>
        <div class="cart-totals" id="cartTotals"></div>
        <button class="btn-place-order" id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
      </div>
      </div><!-- /orderMenuSection -->
    </div><!-- /order-form -->
  </div><!-- /orderOverlay -->

  <!-- TABLE DETAIL MODAL -->
  <div class="modal-overlay" id="tableModal" onclick="closeTableModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Table 1</div>
          <div class="modal-sub" id="modalSub">Session Details</div>
        </div>
        <button class="modal-close" onclick="closeTableModal()">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- BILL PRINT MODAL -->
  <div class="modal-overlay" id="billModal" onclick="closeBillModal()">
    <div class="modal-box bill-box" onclick="event.stopPropagation()">
      <div class="modal-header no-print">
        <span class="modal-title">Bill Preview</span>
        <div style="display:flex;gap:8px;">
          <button class="btn-print" style="display:flex; align-items:center; gap:6px; background:var(--green); color:#000; border-color:var(--green);" id="paymentDoneBtn" onclick="markPaymentDone()"><i data-lucide="check-circle" style="width:14px;height:14px;"></i> Payment Done</button>
          <button class="btn-print" style="display:flex; align-items:center; gap:6px;" onclick="window.print()"><i data-lucide="printer" style="width:14px;height:14px;"></i> Print</button>
          <button class="modal-close" onclick="closeBillModal()">✕</button>
        </div>
      </div>
      <div id="billContent" class="bill-content"></div>
    </div>
  </div>

  <!-- CONFIRM CLOSE MODAL -->
  <div class="modal-overlay" id="confirmCloseModal" onclick="closeConfirmModal()">
    <div class="modal-box" style="max-width:300px; text-align:center;" onclick="event.stopPropagation()">
      <div style="margin-bottom:16px;">
        <i data-lucide="alert-triangle" style="width:48px; height:48px; color:var(--orange);"></i>
      </div>
      <h3 style="margin-bottom:8px;">Close Table <span id="confirmTableNum"></span>?</h3>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:16px;">Please select the payment method used before closing.</p>
      
      <div style="display:flex; flex-direction:column; gap:8px; margin-bottom: 24px; text-align:left;">
        <label style="display:flex; align-items:center; gap:8px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:8px; cursor:pointer;">
          <input type="radio" name="paymentMethod" value="cash" checked style="accent-color:var(--gold-primary); width:16px; height:16px;" onchange="document.getElementById('splitInputs').style.display='none'">
          <span>Full Cash</span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:8px; cursor:pointer;">
          <input type="radio" name="paymentMethod" value="upi" style="accent-color:var(--gold-primary); width:16px; height:16px;" onchange="document.getElementById('splitInputs').style.display='none'">
          <span>Full UPI (GPay/PhonePe)</span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:8px; cursor:pointer;">
          <input type="radio" name="paymentMethod" value="card" style="accent-color:var(--gold-primary); width:16px; height:16px;" onchange="document.getElementById('splitInputs').style.display='none'">
          <span>Full Card</span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:8px; cursor:pointer;">
          <input type="radio" name="paymentMethod" value="split" style="accent-color:var(--gold-primary); width:16px; height:16px;" onchange="document.getElementById('splitInputs').style.display='flex'">
          <span>Split Payment</span>
        </label>
        
        <div id="splitInputs" style="display:none; flex-direction:column; gap:8px; margin-top:8px;">
          <input type="number" id="splitCash" placeholder="Cash Amount (₹)" style="padding:10px; border-radius:8px; border:1px solid #444; background:rgba(255,255,255,0.1); color:#fff; width:100%;">
          <input type="number" id="splitUpi" placeholder="UPI Amount (₹)" style="padding:10px; border-radius:8px; border:1px solid #444; background:rgba(255,255,255,0.1); color:#fff; width:100%;">
          <input type="number" id="splitCard" placeholder="Card Amount (₹)" style="padding:10px; border-radius:8px; border:1px solid #444; background:rgba(255,255,255,0.1); color:#fff; width:100%;">
        </div>
      </div>

      <div style="display:flex; gap:12px; justify-content:center;">
        <button class="btn-action" style="flex:1; background:transparent; border:1px solid #444;" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn-action btn-primary" style="flex:1;" id="confirmCloseBtn">Yes, Close</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js?v=7"></script>
  <script>
    lucide.createIcons();
    if (typeof updateThemeIcon === 'function') updateThemeIcon();
  </script>
</body>
</html>
